<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Learning Networks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-header">
    <h1>Deep Learning Networks</h1>
    <p class="subtitle">Neural networks built from scratch — explore the notebooks and test each one live</p>
  </div>

  <div class="page-body">
    <div class="network-grid" id="network-grid">
      <p style="color:#999">Loading networks…</p>
    </div>
  </div>

  <script>
    async function loadRegistry() {
      const grid = document.getElementById('network-grid');
      try {
        const registry = await (await fetch('networks/registry.json')).json();
        const infos = await Promise.all(
          registry.map(async entry => {
            const info = await (await fetch(entry.path)).json();
            info._id = entry.id;
            return info;
          })
        );

        grid.innerHTML = '';
        infos.forEach(info => {
          const card = document.createElement('a');
          card.className = 'network-card';
          card.href = `network.html?id=${info._id}`;

          const techniques = Array.isArray(info.techniques)
            ? info.techniques.join(' · ')
            : info.techniques;

          card.innerHTML = `
            <h2>${info.name}</h2>
            <div class="arch">${info.architecture}</div>
            <div class="desc">${info.description || ''}</div>
            <span class="accuracy">${info.results.test_accuracy || 'No result'}</span>
            <div class="techniques">${techniques}</div>
          `;
          grid.appendChild(card);
        });

        if (infos.length === 0) {
          grid.innerHTML = '<p style="color:#999">No networks found.</p>';
        }
      } catch (err) {
        grid.innerHTML = '<p style="color:#c00">Failed to load networks.</p>';
        console.error(err);
      }
    }
    loadRegistry();
  </script>

</body>
</html>
